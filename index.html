<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>多田英敏 様｜morich キャリアご提案</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
  :root {
    --red: #E60012;
    --red-light: #fff0f0;
    --gray-50: #f9fafb;
    --gray-100: #f3f4f6;
    --gray-200: #e5e7eb;
    --gray-500: #6b7280;
    --gray-600: #4b5563;
    --gray-700: #374151;
    --gray-900: #111827;
    --blue-50: #eff6ff;
    --blue-100: #dbeafe;
    --blue-600: #2563eb;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Noto Sans JP', sans-serif; background: #f5f5f5; color: var(--gray-900); line-height: 1.75; }
  header { background: #fff; border-bottom: 3px solid var(--red); padding: 14px 24px; display: flex; align-items: center; gap: 16px; position: sticky; top: 0; z-index: 100; box-shadow: 0 2px 8px rgba(0,0,0,0.07); }
  header img { height: 38px; }
  header .htxt p:first-child { font-size: 12px; color: var(--gray-500); }
  header .htxt p:last-child { font-size: 17px; font-weight: 900; }
  .nav-bar { background: var(--gray-900); padding: 0 12px; overflow-x: auto; white-space: nowrap; }
  .nav-bar a { display: inline-block; padding: 13px 18px; color: #ccc; text-decoration: none; font-size: 12px; font-weight: 700; border-bottom: 3px solid transparent; transition: all 0.2s; }
  .nav-bar a:hover { color: #fff; border-bottom-color: var(--red); }
  main { max-width: 860px; margin: 0 auto; padding: 28px 14px 64px; }
  .card { background: #fff; border-radius: 12px; box-shadow: 0 2px 12px rgba(0,0,0,0.07); margin-bottom: 40px; overflow: hidden; border-top: 5px solid var(--red); }
  .card-inner { padding: 28px 28px 36px; }
  .badges { display: flex; flex-wrap: wrap; gap: 7px; margin-bottom: 14px; }
  .badge { font-size: 11px; font-weight: 700; padding: 3px 12px; border-radius: 999px; border: 2px solid var(--red); color: var(--red); background: var(--red-light); }
  .badge-blue { border-color: var(--blue-600); color: var(--blue-600); background: var(--blue-50); }
  .co-name { font-size: clamp(22px, 5vw, 34px); font-weight: 900; line-height: 1.2; margin-bottom: 5px; }
  .co-url { font-size: 12px; margin-bottom: 22px; }
  .co-url a { color: var(--blue-600); text-decoration: none; }
  .co-url a:hover { text-decoration: underline; }
  .overview { background: var(--blue-50); border: 1px solid var(--blue-100); border-radius: 8px; padding: 16px 20px; margin-bottom: 22px; }
  .overview h3 { font-size: 10px; font-weight: 700; color: var(--blue-600); text-transform: uppercase; letter-spacing: .1em; margin-bottom: 10px; }
  .overview table { width: 100%; border-collapse: collapse; font-size: 13px; }
  .overview tr { border-bottom: 1px solid var(--blue-100); }
  .overview tr:last-child { border-bottom: none; }
  .overview th { text-align: left; padding: 6px 14px 6px 0; color: var(--gray-600); font-weight: 700; width: 100px; vertical-align: top; white-space: nowrap; }
  .overview td { padding: 6px 0; color: var(--gray-700); }
  .highlight { background: var(--red-light); border: 2px solid var(--red); border-radius: 8px; padding: 16px 20px; margin-bottom: 22px; }
  .highlight h3 { font-size: 13px; font-weight: 900; color: var(--red); margin-bottom: 8px; }
  .highlight p, .highlight li { font-size: 13px; color: #7a0000; margin-bottom: 4px; }
  .highlight ul { padding-left: 16px; }
  .accordion { margin-bottom: 16px; }
  .acc-header { display: flex; align-items: flex-start; justify-content: space-between; cursor: pointer; padding: 12px 16px; background: var(--gray-50); border: 1px solid var(--gray-200); border-radius: 8px; user-select: none; transition: background 0.15s; }
  .acc-header:hover { background: var(--gray-100); }
  .acc-header .label { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: .08em; color: var(--red); border-left: 3px solid var(--red); padding-left: 8px; margin-bottom: 5px; display: block; }
  .acc-preview { font-size: 12px; color: var(--gray-500); line-height: 1.6; }
  .acc-header-left { flex: 1; }
  .acc-icon { width: 28px; height: 28px; flex-shrink: 0; margin-left: 12px; margin-top: 2px; display: flex; align-items: center; justify-content: center; border-radius: 50%; background: var(--gray-200); font-size: 13px; transition: transform 0.25s, background 0.2s; }
  .acc-header.open .acc-icon { transform: rotate(180deg); background: var(--red); color: #fff; }
  .acc-header.open { border-bottom-left-radius: 0; border-bottom-right-radius: 0; border-bottom-color: transparent; }
  .acc-body { display: none; padding: 20px 18px; border: 1px solid var(--gray-200); border-top: none; border-bottom-left-radius: 8px; border-bottom-right-radius: 8px; font-size: 13px; color: var(--gray-700); line-height: 1.85; }
  .acc-body.open { display: block; }
  .acc-body p { margin-bottom: 10px; }
  .acc-body ul { padding-left: 18px; margin-bottom: 10px; }
  .acc-body li { margin-bottom: 6px; }
  .job-wrap { border: 1px solid var(--gray-200); border-radius: 8px; overflow: hidden; margin-bottom: 16px; }
  .job-header { background: var(--gray-900); color: #fff; padding: 14px 18px; display: flex; align-items: flex-start; justify-content: space-between; cursor: pointer; user-select: none; }
  .job-title-text { font-size: 14px; font-weight: 900; margin-bottom: 3px; }
  .job-preview { font-size: 11px; color: #aaa; line-height: 1.5; }
  .job-icon { width: 26px; height: 26px; flex-shrink: 0; margin-left: 12px; margin-top: 2px; display: flex; align-items: center; justify-content: center; border-radius: 50%; background: rgba(255,255,255,0.15); font-size: 12px; transition: transform 0.25s; }
  .job-header.open .job-icon { transform: rotate(180deg); }
  .job-body { display: none; padding: 20px 18px; font-size: 13px; color: var(--gray-700); line-height: 1.85; }
  .job-body.open { display: block; }
  .job-body p { margin-bottom: 10px; }
  .job-body ul { padding-left: 18px; margin-bottom: 10px; }
  .job-body li { margin-bottom: 6px; }
  .job-section { font-size: 11px; font-weight: 700; color: var(--red); text-transform: uppercase; letter-spacing: .06em; margin: 14px 0 6px; }
  .tag { display: inline-block; font-size: 11px; font-weight: 700; padding: 2px 8px; border-radius: 4px; margin-right: 5px; margin-bottom: 8px; }
  .tag-must { background: var(--red); color: #fff; }
  .tag-want { background: var(--gray-600); color: #fff; }
  .meta-pills { display: flex; flex-wrap: wrap; gap: 7px; margin-top: 14px; }
  .pill { font-size: 12px; font-weight: 700; padding: 4px 11px; border-radius: 999px; background: var(--gray-100); color: var(--gray-700); border: 1px solid var(--gray-200); }
  .section-label { font-size: 11px; font-weight: 700; color: var(--gray-500); text-transform: uppercase; letter-spacing: .08em; border-left: 3px solid var(--red); padding-left: 8px; margin: 22px 0 10px; }
  .links { display: flex; flex-wrap: wrap; gap: 8px; }
  .lbtn { display: inline-flex; align-items: center; gap: 5px; padding: 7px 14px; border-radius: 6px; background: var(--gray-900); color: #fff; font-size: 12px; font-weight: 700; text-decoration: none; transition: background 0.2s; }
  .lbtn:hover { background: var(--red); }
  .lbtn-out { background: transparent; color: var(--gray-900); border: 2px solid var(--gray-200); }
  .lbtn-out:hover { background: var(--gray-900); color: #fff; border-color: var(--gray-900); }
  footer { text-align: center; padding: 28px 16px; font-size: 11px; color: var(--gray-500); border-top: 1px solid var(--gray-200); background: #fff; }
  @media(max-width:600px){ .card-inner{ padding: 18px 14px 24px; } .overview th { width: 80px; } }
</style>
</head>
<body>
<header>
  <img src="morich_logo.jpg" alt="morich">
  <div class="htxt">
    <p>morich キャリアご提案資料</p>
    <p>多田英敏 様</p>
  </div>
</header>
<nav class="nav-bar">
  
</nav>
<main>

</main>
<footer>
  <p>本資料はmorichが多田英敏 様のためにご用意した個人情報を含む機密資料です。無断転用・転載はご遠慮ください。</p>
  <p style="margin-top:6px;">© 株式会社morich</p>
</footer>
<script>
  function toggleAcc(header) {
    const body = header.nextElementSibling;
    header.classList.toggle('open');
    body.classList.toggle('open');
  }
  function toggleJob(header) {
    const body = header.nextElementSibling;
    header.classList.toggle('open');
    body.classList.toggle('open');
  }
</script>
</body>
</html>
